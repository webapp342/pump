# Pump targeted deploy — validate → classify targets → SSH deploy-targeted.sh
#
# Profiles (auto from path filter):
#   indexer_only   apps/indexer-sol-go/** only → go build + systemctl
#   migrate_only   db/migrations/** only      → schema_migrations ledger
#   ui_or_web      pages/components           → Next.js + pm2 pump-tma
#   targeted       mix of slices
#   full           fallback / manual full
#
# Manual: gh workflow run deploy.yml -f mode=indexer|ui|full|migrate|realtime
name: Deploy

on:
  workflow_dispatch:
    inputs:
      mode:
        description: Deploy mode
        required: false
        default: auto
        type: choice
        options:
          - auto
          - full
          - ui
          - indexer
          - realtime
          - migrate
      ref:
        description: Git ref (default main)
        required: false
        default: main
        type: string
  push:
    branches: [main]
    paths:
      - "apps/**"
      - "packages/**"
      - "contracts/**"
      - "db/**"
      - "deploy/**"
      - "scripts/**"
      - "package.json"
      - "package-lock.json"
      - "ecosystem.config.cjs"
      - ".github/workflows/deploy.yml"
      - ".github/workflows/ci.yml"

concurrency:
  group: deploy-tma-production
  cancel-in-progress: true

jobs:
  validate:
    uses: ./.github/workflows/ci.yml

  classify:
    needs: validate
    runs-on: ubuntu-latest
    outputs:
      deploy_targets: ${{ steps.targets.outputs.deploy_targets }}
      deploy_profile: ${{ steps.targets.outputs.deploy_profile }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - uses: dorny/paths-filter@v4
        id: f
        if: github.event_name == 'push'
        with:
          filters: |
            indexer_go:
              - 'apps/indexer-sol-go/**'
            web_ui:
              - 'apps/web/src/components/**'
              - 'apps/web/src/app/globals.css'
              - 'apps/web/src/app/**/page.tsx'
              - 'apps/web/src/app/**/loading.tsx'
              - 'apps/web/src/app/**/error.tsx'
              - 'apps/web/src/app/**/*Client.tsx'
              - 'apps/web/tailwind.config.ts'
              - 'apps/web/postcss.config.mjs'
            web_api:
              - 'apps/web/src/app/api/**'
              - 'apps/web/src/lib/**'
              - 'apps/web/src/hooks/**'
              - 'apps/web/src/config/**'
              - 'apps/web/src/app/layout.tsx'
              - 'apps/web/src/app/**/route.ts'
              - 'apps/web/next.config.ts'
              - 'apps/web/tsconfig.json'
            web_any:
              - 'apps/web/**'
            realtime:
              - 'apps/realtime/**'
            ch_flusher:
              - 'apps/ch-flusher/**'
            price_worker:
              - 'scripts/price-worker.ts'
              - 'deploy/vm/start-price-worker.sh'
            packages:
              - 'packages/**'
            db:
              - 'db/**'
            admin:
              - 'apps/admin/**'
            ecosystem:
              - 'ecosystem.config.cjs'
            lockfile:
              - 'package.json'
              - 'package-lock.json'
            deploy_vm:
              - 'deploy/**'

      - name: Classify deploy targets
        id: targets
        env:
          DEPLOY_MODE: ${{ github.event.inputs.mode || 'auto' }}
          F_INDEXER_GO: ${{ steps.f.outputs.indexer_go || 'false' }}
          F_WEB_UI: ${{ steps.f.outputs.web_ui || 'false' }}
          F_WEB_API: ${{ steps.f.outputs.web_api || 'false' }}
          F_WEB_ANY: ${{ steps.f.outputs.web_any || 'false' }}
          F_REALTIME: ${{ steps.f.outputs.realtime || 'false' }}
          F_CH_FLUSHER: ${{ steps.f.outputs.ch_flusher || 'false' }}
          F_PRICE_WORKER: ${{ steps.f.outputs.price_worker || 'false' }}
          F_PACKAGES: ${{ steps.f.outputs.packages || 'false' }}
          F_DB: ${{ steps.f.outputs.db || 'false' }}
          F_ADMIN: ${{ steps.f.outputs.admin || 'false' }}
          F_ECOSYSTEM: ${{ steps.f.outputs.ecosystem || 'false' }}
          F_LOCKFILE: ${{ steps.f.outputs.lockfile || 'false' }}
          F_DEPLOY_VM: ${{ steps.f.outputs.deploy_vm || 'false' }}
        run: bash deploy/vm/gh-classify-targets.sh

  deploy:
    needs: classify
    runs-on: ubuntu-latest
    steps:
      - name: Deploy summary
        run: |
          echo "## Deploy profile: ${{ needs.classify.outputs.deploy_profile }}" >> "$GITHUB_STEP_SUMMARY"
          echo "Targets: \`${{ needs.classify.outputs.deploy_targets }}\`" >> "$GITHUB_STEP_SUMMARY"

      - name: Targeted deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          port: ${{ secrets.VM_SSH_PORT }}
          script_stop: true
          command_timeout: 25m
          script: |
            set -euo pipefail
            export GIT_REF="${{ github.event.inputs.ref || 'main' }}"
            export DEPLOY_SHA="${{ github.sha }}"
            export DEPLOY_TARGETS="${{ needs.classify.outputs.deploy_targets }}"
            export DEPLOY_PROFILE="${{ needs.classify.outputs.deploy_profile }}"
            export DEPLOY_MODE="${{ github.event.inputs.mode || 'auto' }}"
            echo "[deploy] profile=$DEPLOY_PROFILE targets=$DEPLOY_TARGETS sha=$DEPLOY_SHA"
            cd /var/www/pump/tma
            # Bootstrap sync — VM may lack deploy-targeted.sh until this fetch (sync_only chicken-egg).
            git fetch origin "$GIT_REF"
            git reset --hard "origin/$GIT_REF"
            export DEPLOY_SHA="$(git rev-parse --short HEAD)"
            chmod +x deploy/vm/*.sh deploy/tma-deploy.sh 2>/dev/null || true
            if [[ ! -f deploy/vm/deploy-targeted.sh ]]; then
              echo "[deploy] ERROR: deploy/vm/deploy-targeted.sh missing after sync at $DEPLOY_SHA"
              exit 1
            fi
            export DEPLOY_SKIP_GIT_CLEAN=1
            bash deploy/vm/deploy-targeted.sh
