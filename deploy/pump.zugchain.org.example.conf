# Cloudflare origin SSL — ui-app pattern
# 1) ssl_certificate yollarini /etc/nginx/ssl/ altindaki dosyalarinla degistir
# 2) sudo ln -sf ... sites-enabled/
# 3) sudo nginx -t && sudo systemctl reload nginx
#
# IP-only (HTTP) icin deploy/nginx-pump.conf kullan — ws://IP/ws
# Domain + SSL icin asagidaki config — wss://pump.zugchain.org/ws

upstream pump_tma {
    server 127.0.0.1:3012;
    keepalive 16;
}

upstream pump_realtime {
    server 127.0.0.1:3013;
    keepalive 8;
}

server {
    listen 80;
    listen [::]:80;
    server_name pump.zugchain.org;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name pump.zugchain.org;

    ssl_certificate     /etc/nginx/ssl/pump.zugchain.org.pem;
    ssl_certificate_key /etc/nginx/ssl/pump.zugchain.org.key;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";

    location /ws {
        proxy_pass http://pump_realtime;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    location /assets/ {
        alias /var/pump/assets/;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        try_files $uri =404;
    }

    include /var/www/pump/tma/deploy/nginx-next-static.conf.snippet;

    location / {
        proxy_pass http://pump_tma;
    }
}
