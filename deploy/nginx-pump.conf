server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    # Cloudflare Flexible/Full: browser is HTTPS but origin may be HTTP :80
    set $pump_forwarded_proto $scheme;
    if ($http_cf_visitor ~* '"scheme":"https"') {
        set $pump_forwarded_proto https;
    }

    client_max_body_size 4m;

    location /assets/ {
        alias /var/pump/assets/;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        try_files $uri =404;
    }

    location /ws {
        proxy_pass http://127.0.0.1:3013;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $pump_forwarded_proto;
        proxy_read_timeout 86400;
    }

    # Admin console (static Vite build) — BEFORE location /
    location = /admin {
        return 301 /admin/;
    }

    location /admin/ {
        alias /var/www/pump/tma/apps/admin/dist/;
        index index.html;
    }

    location / {
        proxy_pass http://127.0.0.1:3012;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $pump_forwarded_proto;
    }
}
