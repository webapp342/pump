# Cloudflare → VM origin SSL for a single Pump subdomain.
#
# Domain example: drp3n0s224kcge8sd4718aevon3.zugchain.org
# DNS (Cloudflare): A record → 104.207.64.115, Proxied (orange cloud)
# SSL/TLS mode: Full (strict)
#
# 1) Origin cert on VM (from Cloudflare dashboard — NOT committed to git):
#      /etc/nginx/ssl/zugchain-origin.pem   ← certificate block
#      /etc/nginx/ssl/zugchain-origin.key   ← private key
#    chmod 600 /etc/nginx/ssl/zugchain-origin.key
#
# 2) Copy + edit server_name, then enable:
#      sudo cp deploy/nginx-drp-subdomain.example.conf /etc/nginx/sites-available/pump-subdomain
#      sudo ln -sf /etc/nginx/sites-available/pump-subdomain /etc/nginx/sites-enabled/
#      sudo nginx -t && sudo systemctl reload nginx
#
# 3) VM .env (rebuild + pm2 restart pump-tma):
#      NEXT_PUBLIC_APP_URL=https://drp3n0s224kcge8sd4718aevon3.zugchain.org
#      NEXT_PUBLIC_WS_URL=wss://drp3n0s224kcge8sd4718aevon3.zugchain.org/ws
#
# IP-only HTTP (104.207.64.115) can stay on deploy/nginx-pump.conf default_server :80.

upstream pump_tma {
    server 127.0.0.1:3012;
    keepalive 16;
}

upstream pump_realtime {
    server 127.0.0.1:3013;
    keepalive 8;
}

server {
    listen 80;
    listen [::]:80;
    server_name drp3n0s224kcge8sd4718aevon3.zugchain.org;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name drp3n0s224kcge8sd4718aevon3.zugchain.org;

    ssl_certificate     /etc/nginx/ssl/zugchain-origin.pem;
    ssl_certificate_key /etc/nginx/ssl/zugchain-origin.key;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    client_max_body_size 4m;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";

    location /assets/ {
        alias /var/pump/assets/;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        try_files $uri =404;
    }

    location /ws {
        proxy_pass http://pump_realtime;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    location = /admin {
        return 301 /admin/;
    }

    location /admin/ {
        alias /var/www/pump/tma/apps/admin/dist/;
        index index.html;
    }

    location / {
        proxy_pass http://pump_tma;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
