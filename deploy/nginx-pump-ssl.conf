# Production nginx — Cloudflare Origin SSL (Full / Strict)
# Installed by deploy/vm/bootstrap-production.sh → /etc/nginx/sites-available/pump
#
# Requires:
#   /etc/nginx/conf.d/pump-cloudflare-map.conf  (deploy/nginx-cloudflare-map.conf)
#   /etc/nginx/ssl/<domain>.pem + .key

upstream pump_tma {
    server 127.0.0.1:3012;
    keepalive 16;
}

upstream pump_realtime {
    server 127.0.0.1:3013;
    keepalive 8;
}

server {
    listen 80;
    listen [::]:80;
    server_name pump.zugchain.org;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name pump.zugchain.org;

    ssl_certificate     /etc/nginx/ssl/pump.zugchain.org.pem;
    ssl_certificate_key /etc/nginx/ssl/pump.zugchain.org.key;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    client_max_body_size 4m;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";

    location /assets/ {
        alias /var/pump/assets/;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        try_files $uri =404;
    }

    location /ws {
        proxy_pass http://pump_realtime;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    location = /admin {
        return 301 /admin/;
    }

    location /admin/ {
        alias /var/www/pump/tma/apps/admin/dist/;
        index index.html;
    }

    location / {
        proxy_pass http://pump_tma;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
